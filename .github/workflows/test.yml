name: Test setup-ruyi-action

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-latest:
    name: Test latest version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ruyi (latest)
        id: ruyi
        uses: ./

      - name: Verify ruyi is on PATH
        run: command -v ruyi

      - name: Print ruyi version
        run: ruyi version

      - name: Verify outputs
        run: |
          [[ -n "${{ steps.ruyi.outputs.ruyi-version }}" ]] || { echo "::error::ruyi-version output is empty"; exit 1; }
          [[ -f "${{ steps.ruyi.outputs.ruyi-path }}" ]] || { echo "::error::ruyi-path does not point to a file"; exit 1; }

  test-pinned:
    name: Test pinned version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ruyi (pinned)
        id: ruyi
        uses: ./
        with:
          ruyi-version: '0.46.0'

      - name: Verify installed version
        run: |
          [[ "${{ steps.ruyi.outputs.ruyi-version }}" == "0.46.0" ]] || { echo "::error::Expected version 0.46.0"; exit 1; }
          ruyi version

  test-beta:
    name: Test beta channel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ruyi (beta)
        id: ruyi
        uses: ./
        with:
          ruyi-version: 'beta'

      - name: Verify beta version resolved
        run: |
          [[ "${{ steps.ruyi.outputs.ruyi-version }}" == *-beta.* ]] || { echo "::error::Expected a beta version"; exit 1; }
          ruyi version

  test-venv:
    name: Test virtual environment
    strategy:
      matrix:
        include:
          - runs-on: ubuntu-latest
            venv-emulator: qemu-user-riscv-upstream
          - runs-on: ubuntu-24.04-arm
            venv-emulator: ""
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup ruyi and venv
        id: ruyi
        uses: ./
        with:
          venv-profile: generic
          venv-toolchain: gnu-upstream
          venv-emulator: ${{ matrix.venv-emulator }}

      - name: Smoke-test cross-compilation and emulation
        run: |
          riscv64-unknown-linux-gnu-gcc --version
          echo '#include <stdio.h>' > hello.c
          echo 'int main() { printf("Hello, world!\n"); return 0; }' >> hello.c
          riscv64-unknown-linux-gnu-gcc -O2 -g hello.c -o hello
          file hello
          ruyi-qemu hello
